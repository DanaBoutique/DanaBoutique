<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة المنتجات</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
            <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">

</head>

<body>

    <header>
        <div class="logo">
            <h1>لوحة تحكم <span>الجوهرة</span></h1>
        </div>

        <nav>
            <ul>
                <li>
                    <a href="../index.html" target="_blank">
                        معاينة المتجر 👁️
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- نموذج إضافة منتج جديد (في الأعلى) -->
    <main class="admin-container">

        <h2>إضافة منتج جديد</h2>

        <form id="add-product-form">

            <!-- اسم القطعة -->
            <div class="form-group">
                <label>اسم القطعة</label>
                <input type="text" id="prod-name" required>
            </div>

            <!-- السعر والكمية -->
            <div class="form-row">

                <div class="form-group">
                    <label>السعر بالدينار</label>
                    <input type="number" id="prod-price" required>
                </div>

                <div class="form-group">
                    <label>الكمية المتوفرة</label>
                    <input type="number" id="prod-stock" required>
                </div>

            </div>

            <!-- العيار والنوع -->
            <div class="form-row">

                <div class="form-group">
                    <label>عيار الذهب المطلي</label>

                    <select id="prod-caliber">
                        <option>18 قيراط</option>
                        <option>21 قيراط</option>
                        <option>24 قيراط</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>النوع</label>

                    <select id="prod-type">
                        <option>خواتم</option>
                        <option>أساور</option>
                        <option>سلاسل</option>
                        <option>أطقم</option>
                    </select>
                </div>

            </div>

            <!-- الصور -->
            <div class="form-group">
                <label>رابط الصورة الرئيسية</label>
                <input type="text" id="prod-main-image" placeholder="ضع رابط الصورة الرئيسية" required>
            </div>

            <div class="form-group">
                <label>روابط الصور الجانبية</label>
                <textarea id="prod-gallery" rows="4" placeholder="ضع كل رابط في سطر منفصل"></textarea>
            </div>

            <!-- الوصف -->
            <div class="form-group">
                <label>وصف القطعة</label>
                <textarea id="prod-desc" rows="5" required></textarea>
            </div>

            <!-- نشر المنتج -->
            <div class="form-group">
                <label>
                    <input type="checkbox" id="prod-publish" checked>
                    نشر المنتج على الموقع
                </label>
            </div>

            <button type="submit" class="btn-submit-prod">
                نشر المنتج ✨
            </button>

        </form>

    </main>

    <!-- جدول المنتجات الحالية (في الأسفل) -->
    <div id="admin-table-wrapper"></div>

    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/admin.js"></script> <!-- أو main.js أو product.js -->


</body>
</html>
