<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل القطعة | دانه بوتيك</title>
    <link rel="stylesheet" href="../css/product.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
</head>
<body>

    <header>
        <div class="logo">
            <h1>دانه <span>بوتيك</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">الرئيسية</a></li>
                <li><a href="../index.html#categories">الأقسام</a></li>
                <li><a href="../index.html#products">المنتجات</a></li>
              <!--  <li><button id="lang-switcher" class="lang-btn">English</button></li> -->
            </ul>
        </nav>
        <div class="cart-icon">
            <a href="cart.html">🛒 السلة (<span id="cart-count">0</span>)</a>
        </div>
    </header>

    <main class="product-details-container">
        
        <div class="product-single-wrapper">

            <!-- معرض الصور -->

            <div class="product-gallery">

                <!-- الصورة الرئيسية -->

                <div class="main-image-box">

                    <img src="../image/placeholder.jpg"
                         id="main-product-img"
                         alt="صورة المنتج الرئيسية">

                </div>

                <!-- الصور الجانبية -->

                <div class="thumbnails-container"
                     id="product-thumbnails">

                </div>

            </div>

            <!-- معلومات المنتج -->

            <div class="product-info-box">

                <!-- اسم المنتج -->

                <h2 class="product-title"
                    id="p-title">
                    اسم المنتج
                </h2>

                <!-- نوع المنتج -->

                <div class="product-meta">

                    <span class="badge-gold"
                          id="p-type">
                        خواتم
                    </span>

                </div>

                <!-- السعر -->

                <p class="product-single-price"
                   id="p-price">
                    0 دينار
                </p>

                <!-- المواصفات -->

                <div class="specs-table">

                    <h3>
                        المواصفات:
                    </h3>

                    <ul>

                        <li>

                            <strong>
                                عيار الذهب المطلي:
                            </strong>

                            <span >

                                21 قيراط

                            </span>

                        </li>

                        <li>

                            <strong>
                                الكمية المتوفرة:
                            </strong>

                            <span id="p-stock"
                                  style="
                            color:green;
                            font-weight:bold;
                        ">

                                0

                            </span>

                        </li>

                        

                    </ul>

                </div>

                <!-- الوصف -->

                <p class="product-description"
                   id="p-description">

                    وصف المنتج

                </p>

                <!-- الشراء -->

                <div class="purchase-actions">

                    <div class="qty-selector">

                        <label for="product-qty">

                            الكمية:

                        </label>

                        <input type="number"
                               id="product-qty"
                               value="1"
                               min="1"
                               max="0"
                               oninput="checkQuantityLimit(this)">

                    </div>

                    <button class="btn-main-add"
                            id="add-to-cart-trigger">

                        إضافة إلى سلة المشتريات 🛒

                    </button>

                </div>

            

        
        <div class="trust-badge">
            🛡️ الفحص والاستلام يد بيد - الدفع عند الاستلام كامل التكلفة بعد المعاينة.
        </div>
        </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 متجر دانه بوتيك للمجوهرات. جميع الحقوق محفوظة.</p>
    </footer>
   <script type="module" src="js/firebase.js"></script>
   <script type="module" src="js/product.js"></script> <!-- أو main.js أو product.js -->

</body>
</html>
